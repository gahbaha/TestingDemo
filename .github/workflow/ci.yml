name: CI

on:
  push: 
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: macos-latest

    steps:
    - names: checkout to a repository 
      uses: action/checkout@v4

    - names: Set up python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - names: Install dependencies 
      run: |
        python -m pip3 install --upgrade pip3 
        pip3 install pytest 

    - names: Run the tests 
      run: pytest -q 