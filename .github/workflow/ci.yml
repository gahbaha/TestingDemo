name: CI

on:
  push: 
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: checkout to a repository 
      uses: action/checkout@v4

    - name: Set up python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies 
      run: |
        python -m pip install --upgrade pip 
        pip install pytest 

    - name: Run the tests 
      run: pytest -q 